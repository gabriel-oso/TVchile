<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Chile Online</title>
    <!-- Librería HLS para reproducir streams .m3u8 en Android, Windows y Smart TV -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        video {
            width: 100%;
            max-height: 450px;
            background-color: black;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .grid-canales {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }
        button {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #0b7dda;
        }
        h2 { margin-top: 15px; color: #bbb; }
        .aviso { font-size: 13px; color: #ffeb3b; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>TV Abierta Chile</h1>
    
    <!-- El reproductor corregido con muted y playsinline para evitar que los celulares lo bloqueen -->
    <video id="video" controls autoplay muted playsinline webkit-playsinline></video>
    
    <p class="aviso">⚠️ Nota: El reproductor inicia silenciado por seguridad del celular. Activa el sonido manualmente.</p>
    <h2 id="canal-actual">Selecciona un canal</h2>

    <div class="grid-canales">
        <button onclick="cargarCanal('https://wurl.tv', 'Chilevisión')">Chilevisión</button>
        <button onclick="cargarCanal('https://tvn.cl', 'TVN HD')">TVN</button>
        <button onclick="cargarCanal('https://tvn.cl', 'NTV (Cultural)')">NTV</button>
        <button onclick="cargarCanal('https://subatv.com', 'Canal 13 (Alternativo)')">Canal 13</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const txtCanal = document.getElementById('canal-actual');
    let hls = null;

    function cargarCanal(url, nombre) {
        txtCanal.innerText = "Cargando: " + nombre + "...";
        
        // Configuración para Android / Chrome / Windows / Smart TV
        if (Hls.isSupported()) {
            if (hls) { hls.destroy(); } 
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                txtCanal.innerText = "Reproduciendo: " + nombre;
                video.play().catch(e => console.log("Autoplay bloqueado:", e));
            });
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    txtCanal.innerText = "Error cargando " + nombre + " (Señal inestable o caída)";
                }
            });
        } 
        // Configuración nativa para Apple (Safari en iPhone / iPad / Mac)
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('loadedmetadata', function() {
                txtCanal.innerText = "Reproduciendo: " + nombre;
                video.play().catch(e => console.log("Autoplay bloqueado:", e));
            });
        }
    }
</script>

</body>
</html>
