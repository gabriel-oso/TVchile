<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Chile Limpio</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        video { width: 100%; max-height: 450px; background-color: black; border-radius: 8px; }
        .grid-canales { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 25px; }
        button { background-color: #E50914; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #b20710; }
        h2 { margin-top: 15px; color: #bbb; }
    </style>
</head>
<body>

<div class="container">
    <h1>TV Abierta Chile (Sin Publicidad)</h1>
    <video id="video" controls autoplay muted playsinline webkit-playsinline></video>
    <h2 id="canal-actual">Selecciona un canal</h2>

    <div class="grid-canales">
        <!-- Señales procesadas por servidores de distribución alternativos que no bloquean navegadores móviles -->
        <button onclick="cargarCanal('https://wurl.tv', 'Chilevisión')">Chilevisión</button>
        <button onclick="cargarCanal('https://mdstrm.com', 'Canal 13')">Canal 13</button>
        <button onclick="cargarCanal('https://tvn.cl', 'TVN HD')">TVN</button>
        <button onclick="cargarCanal('https://tvn.cl', 'NTV')">NTV</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const txtCanal = document.getElementById('canal-actual');
    let hls = null;

    function cargarCanal(url, nombre) {
        txtCanal.innerText = "Conectando con " + nombre + "...";
        
        // Usamos un puente CORS público alternativo directo para evitar el bloqueo del navegador móvil
        const proxyUrl = "https://allorigins.win" + encodeURIComponent(url);
        
        // Si el canal es TVN o NTV usamos su ruta directa porque manejan tokens dinámicos independientes
        const urlFinal = (url.includes('tvn.cl') || url.includes('wurl.tv')) ? url : proxyUrl;

        if (Hls.isSupported()) {
            if (hls) { hls.destroy(); } 
            hls = new Hls({
                xhrSetup: function (xhr, url) {
                    xhr.withCredentials = false; // Remueve cookies que gatillan bloqueos de seguridad
                }
            });
            hls.loadSource(urlFinal);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                txtCanal.innerText = "Reproduciendo: " + nombre;
                video.play().catch(e => console.log("Espera interacción del usuario"));
            });
            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) { txtCanal.innerText = " Error en señal. Reintenta otro canal."; }
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = urlFinal;
            video.addEventListener('loadedmetadata', function() {
                txtCanal.innerText = "Reproduciendo: " + nombre;
                video.play();
            });
        }
    }
</script>

</body>
</html>
